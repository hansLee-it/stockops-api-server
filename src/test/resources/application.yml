spring:
  profiles:
    default: local
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false
  datasource:
    url: jdbc:h2:mem:stockops-test;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

stockops:
  redis:
    enabled: false
  environment:
    alert-outbox:
      # The scheduled outbox sender must not run during context-loading tests.
      enabled: false

# This file shadows src/main/resources/application.yml entirely, so the prometheus
# endpoint must be exposed here for SecurityConfigTest to exercise the real endpoint
# (otherwise a permitAll regression surfaces as 404 instead of 200).
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

jwt:
  secret: stockops-test-secret-key-with-at-least-256-bits
  expiration: 86400000
