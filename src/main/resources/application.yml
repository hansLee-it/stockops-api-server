spring:
  application:
    name: stockops
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
  profiles:
    default: local

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:StockOpsSecretKeyForJWTTokenGenerationMustBeLongEnough2024}
  expiration: 86400000

stockops:
  sensimul:
    base-url: ${STOCKOPS_SENSIMUL_BASE_URL:http://localhost:18080}
    connect-timeout: 5s
    read-timeout: 15s
  retention:
    retention-days: 30
    batch-size: 1000
    enabled: true
  mqtt-ingestion:
    enabled: ${STOCKOPS_MQTT_INGESTION_ENABLED:true}
    broker-url: ${STOCKOPS_MQTT_INGESTION_BROKER_URL:tcp://192.168.0.11:1883}
    qos: ${STOCKOPS_MQTT_INGESTION_QOS:1}
    client-id: ${STOCKOPS_MQTT_INGESTION_CLIENT_ID:}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:stockops;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockops}
    username: ${STOCKOPS_DATASOURCE_USERNAME:stockops}
    password: ${STOCKOPS_DATASOURCE_PASSWORD:stockops}
    driver-class-name: org.postgresql.Driver

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${STOCKOPS_DATASOURCE_URL}
    username: ${STOCKOPS_DATASOURCE_USERNAME}
    password: ${STOCKOPS_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
